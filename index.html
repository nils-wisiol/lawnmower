<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lawnmower</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: #131c10;
        color: #eaf6c9;
        font-family: system-ui, sans-serif;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: 0.02em;
      }
      #game {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }
      canvas.board {
        image-rendering: pixelated;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        /* Own all touch gestures on the board so swipes drive the mower instead
           of scrolling/zooming the page (see src/input/swipe.ts). */
        touch-action: none;
      }
      p.status {
        margin: 0;
        font-size: 0.95rem;
        min-height: 1.2em;
      }
      .coach {
        max-width: 32ch;
        margin: 0;
        padding: 0.5rem 0.85rem;
        border-radius: 8px;
        border: 1px solid #6a8f3e;
        background: #24361c;
        color: #eaf6c9;
        font-size: 0.9rem;
        line-height: 1.35;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      }
      .coach[hidden] {
        display: none;
      }
      .controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
      }
      .new-lawn-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }
      .new-lawn {
        font: inherit;
        font-weight: 600;
        padding: 0.5rem 1.1rem;
        border-radius: 6px;
        border: 1px solid #3a4a2e;
        background: #2c3d21;
        color: #eaf6c9;
        cursor: pointer;
      }
      .new-lawn:hover {
        background: #364a29;
      }
      .shape-label {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.8rem;
        opacity: 0.85;
      }
      .shape-select {
        font: inherit;
        font-size: 0.85rem;
        padding: 0.25rem 0.4rem;
        border-radius: 4px;
        border: 1px solid #3a4a2e;
        background: #0f160c;
        color: #eaf6c9;
        cursor: pointer;
      }
      .controls-hint {
        margin: 0;
        max-width: 32ch;
        font-size: 0.8rem;
        opacity: 0.85;
        color: #d6ea9e;
      }
      .controls-hint[hidden] {
        display: none;
      }
      .seed-form {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
      }
      .seed-label {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.8rem;
        opacity: 0.85;
      }
      .seed-input {
        font: inherit;
        font-size: 0.85rem;
        padding: 0.25rem 0.4rem;
        border-radius: 4px;
        border: 1px solid #3a4a2e;
        background: #0f160c;
        color: #eaf6c9;
        min-width: 12ch;
      }
      .seed-form button {
        font: inherit;
        font-size: 0.85rem;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
        border: 1px solid #3a4a2e;
        background: #22301a;
        color: #eaf6c9;
        cursor: pointer;
      }
      .seed-form button:hover {
        background: #2c3d21;
      }
      .best-time {
        margin: 0;
        font-size: 0.8rem;
        opacity: 0.8;
        min-height: 1.1em;
      }
      .hint {
        margin: 0;
        font-size: 0.8rem;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lawnmower</h1>
      <div id="game"></div>
      <p class="hint">
        Mow every tile exactly once, fast — the clock is your score. Re-mowing a tile crashes the
        mower. N = next lawn, R = replay. Share the URL to send this exact lawn; paste a level code
        to load one.
      </p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
