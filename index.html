<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lawnmower</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: #131c10;
        color: #eaf6c9;
        font-family: system-ui, sans-serif;
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: 0.02em;
      }
      #game {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }
      canvas.board {
        image-rendering: pixelated;
        border-radius: 4px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        /* Own all touch gestures on the board so swipes drive the mower instead
           of scrolling/zooming the page (see src/input/swipe.ts). */
        touch-action: none;
      }
      p.status {
        margin: 0;
        font-size: 0.95rem;
        min-height: 1.2em;
      }
      .hint {
        margin: 0;
        font-size: 0.8rem;
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lawnmower</h1>
      <div id="game"></div>
      <p class="hint">
        Mow every tile exactly once, fast — the clock is your score. Re-mowing a tile crashes the
        mower. N = next lawn, R = replay.
      </p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
